syntax = "proto3";

package com.pepyachka.event;

option java_multiple_files = true;
option java_package = "com.pepyachka.event";
option java_outer_classname = "UserRegisteredEventProto";

import "google/protobuf/timestamp.proto";

message UserRegisteredEvent {
  string user_id = 1;
  string email = 2;
  string password_hash = 3;
  string role = 4;
  google.protobuf.Timestamp created_at = 5;
}
