# spring application
spring.application.name=tmmp

# datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/tmmp
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# jooq
spring.jooq.sql-dialect=POSTGRES

# liquibase
spring.liquibase.change-log=classpath:liquibase/tmmp/changelog/tmmp-changelog.xml
spring.liquibase.enabled=true

# kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer

# management endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# logging
logging.level.com.tmmp=DEBUG
logging.level.org.springframework=DEBUG

# custom app configuration
app.kafka.topics.user-registered-event-topic-v1=user-registered-event-topic-v1
app.kafka.consumers.user-registered-event-topic-v1.group-id=user-registered-event-tmmp
app.kafka.consumers.user-registered-event-topic-v1.concurrency=1
